name: Feature request
description: Propose an improvement, example, integration, or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Feature requests and contribution proposals are welcome.

  - type: textarea
    id: request
    attributes:
      label: Request
      description: Describe the feature, example, integration, or project you want to add.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Explain the practical CUDA, Numba, Python, or integration use case.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe how it could work. You may also link a branch, repository, or prototype.

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Runtime feature
        - Compatibility
        - Performance
        - Python example
        - Framework integration
        - Documentation
        - Tooling or CI
        - External project reference
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime
        - Numba integration
        - Metal execution
        - Memory and buffers
        - Streams and async execution
        - Packaging and installation
        - CI and testing
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      description: Maintainers may change this during review.
      options:
        - P1 - Important
        - P2 - Normal
        - P3 - Nice to have
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request for this request.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this request.
          required: true
