name: Bug report
description: Report a reproducible problem in MetaXuda
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve MetaXuda.

  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide a minimal Python example and the steps needed to reproduce the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Error output
      description: Paste the complete traceback or relevant logs. Remove credentials and personal paths.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime
        - Numba integration
        - Metal execution
        - Memory and buffers
        - Streams and async execution
        - Packaging and installation
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.5
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Apple Silicon model
      placeholder: e.g. M1 Pro
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Python, Numba, and MetaXuda versions
      placeholder: Python 3.12, Numba 0.x, MetaXuda 2.0.1
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this report.
          required: true
        - label: I removed credentials, tokens, and personal paths from the report.
          required: true
